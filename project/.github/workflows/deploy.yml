# =============================================================================
# Vercel Production Deployment Workflow
# =============================================================================
#
# STATUS: DISABLED BY DEFAULT
#
# This workflow is disabled. The `on:` triggers below are commented out.
# To enable automatic deployments, uncomment the triggers you want.
# See project/README.md → "Vercel Deployment" for full instructions.
#
# =============================================================================

name: Deploy to Vercel

on:
  # ── Uncomment ONE of the blocks below to enable automatic deployments ──

  # Option A: Deploy on every push to main
  # push:
  #   branches:
  #     - main

  # Option B: Deploy on pull request (preview deployments)
  # pull_request:
  #   branches:
  #     - main

  # Option C: Deploy on both push to main AND pull requests
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

  # Manual trigger — always available regardless of the above
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm type-check

      - name: Run linter
        run: pnpm lint

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment variables
        run: vercel pull --yes --environment=${{ github.event.inputs.environment || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
